name: Claude Code Review

on:
  pull_request:
    branches: [main, develop]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          model: claude-opus-4-7
          direct_prompt: |
            Review this pull request. Read the diff and post findings as inline PR comments.

            Check:
            - Correctness: logic errors, edge cases, null handling
            - Security: injection, auth bypass, data exposure
            - Code quality: naming, complexity, duplication, error handling
            - Compliance with project rules in .claude/rules/

            Categorize every issue:
            - Critical (must fix): bugs, security issues, broken functionality
            - Important (should fix): architecture problems, missing error handling, test gaps
            - Minor (nice to have): style, optimization, polish

            For each issue: file:line reference, what's wrong, why it matters, how to fix.
            End with a top-level summary comment: "Ready to merge: Yes / No / With fixes" + 1-2 sentence assessment.
