name: CI

on:
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Lint backend (ruff)
        if: hashFiles('backend/**/*.py') != ''
        run: |
          uv pip install --system ruff
          ruff check backend/
          ruff format --check backend/

      - name: Install frontend deps
        if: hashFiles('frontend/package.json') != ''
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Lint frontend (eslint)
        if: hashFiles('frontend/package.json') != ''
        run: cd frontend && pnpm lint

      - name: Format check frontend (prettier)
        if: hashFiles('frontend/package.json') != ''
        run: cd frontend && pnpm format:check

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Test backend (pytest)
        if: hashFiles('backend/**/*.py') != ''
        run: |
          cd backend
          uv pip install --system -e ".[dev]"
          pytest

      - name: Install frontend deps
        if: hashFiles('frontend/package.json') != ''
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Test frontend (vitest)
        if: hashFiles('frontend/package.json') != ''
        run: cd frontend && pnpm test

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Type check backend (mypy)
        if: hashFiles('backend/**/*.py') != ''
        run: |
          cd backend
          uv pip install --system -e ".[dev]"
          mypy .

      - name: Install frontend deps
        if: hashFiles('frontend/package.json') != ''
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Type check frontend (vue-tsc)
        if: hashFiles('frontend/package.json') != ''
        run: cd frontend && pnpm typecheck
